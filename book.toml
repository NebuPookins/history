[book]
title = "Nebu's Summary of History"
authors = ["Nebu Pookins"]
language = "en"
src = "src"

[output.html]
git-repository-url = "https://github.com/nebupookins/history"
edit-url-template = "https://github.com/nebupookins/history/edit/main/{path}"
default-theme = "light"
preferred-dark-theme = "navy"
additional-css = ["theme/flashcard.css"]
additional-js = ["mermaid.min.js", "mermaid-init.js", "theme/flashcard.js"]

[output.html.search]
enable = true

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"

[preprocessor.flashcard]
command = "node preprocessors/mdbook-flashcard.js"
